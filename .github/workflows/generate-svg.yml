name: Generate Language SVG (AArch64 Asm)

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *' # Daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup AArch64 Toolchain
        uses: malken21/setup-aarch64-toolchain@v1

      - name: Fetch Language Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch languages for all repositories and aggregate
          gh api graphql --paginate --slurp -f query='
            query($endCursor: String) {
              user(login: "malken21") {
                repositories(first: 100, ownerAffiliations: OWNER, isFork: false, after: $endCursor) {
                  pageInfo {
                    endCursor
                    hasNextPage
                  }
                  nodes {
                    languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                      edges {
                        size
                        node {
                          name
                          color
                        }
                      }
                    }
                  }
                }
              }
            }
          ' | jq '.[].data.user.repositories.nodes[].languages.edges[] | {name: .node.name, size: .size, color: .node.color}' | \
          jq -s 'group_by(.name) | map({name: .[0].name, size: map(.size) | add, color: .[0].color}) | sort_by(.size) | reverse | .[:100] | .[] | "\(.name)\t\(.size)\t\(.color // "#8b949e")"' -r > languages.dat
          echo "Fetched data (first 5 lines):"
          head -n 5 languages.dat

      - name: Assemble and Link
        run: |
          as -o main.o main.s
          ld -o main main.o

      - name: Generate SVG
        run: ./main

      - name: Commit and Push SVG
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add languages.svg
          git commit -m "Update language visualization [skip ci]" || echo "No changes to commit"
          git push
